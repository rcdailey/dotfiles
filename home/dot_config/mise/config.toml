[tools]
age = "latest"
cosign = "latest"
d2 = "latest"
delta = "latest"
fzf = "latest"
git-filter-repo = "latest"
gh = "latest"
jq = "latest"
lazygit = "latest"
lsd = "latest"
markdownlint-cli2 = "latest"
powershell = "latest"
pre-commit = "latest"
rclone = "latest"
ripgrep = "latest"
slsa-verifier = "latest"
task = "latest"
uv = "latest"
worktrunk = "latest"
yamllint = "latest"
yq = "latest"
bun = "latest"
zizmor = "latest"
ruff = "latest"
"github:byteowlz/sx" = "latest"

# Node and NPM packages
node = "latest"
"npm:@commitlint/cli" = "latest"
"npm:@commitlint/config-conventional" = "latest"
"npm:ctx7" = "latest"

# Don't use this because it doesn't update frequently enough
# Use: curl -fsSL https://opencode.ai/install | bash
# opencode = "latest"

# Release assets are bare binaries; plannotator-paste-* assets make autodetection
# ambiguous, so pin the asset per platform
[tools."github:backnotprop/plannotator"]
version = "latest"
bin = "plannotator"

[tools."github:backnotprop/plannotator".platforms]
linux-x64 = { asset_pattern = "plannotator-linux-x64" }
macos-arm64 = { asset_pattern = "plannotator-darwin-arm64" }

[settings]
activate_aggressive = true
auto_install = true
jobs = 4
trusted_config_paths = ["~/.config/mise", "~"]
experimental = true
env_file = ".env"
netrc = false
node.verify = false

[settings.github]
credential_command = "gh auth token"

[env]
_.source = ["~/.config/mise/scripts/node-path.sh"]

[hooks]
cd = "mise current 2>/dev/null | head -5 || true"
